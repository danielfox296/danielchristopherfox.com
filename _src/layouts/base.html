<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <meta name="description" content="{{meta_description}}">
  <meta name="robots" content="{{robots}}">
  <link rel="canonical" href="{{canonical}}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{meta_description}}">
  <meta property="og:url" content="{{canonical}}">
  <meta property="og:site_name" content="Daniel Fox">
  <meta property="og:image" content="https://danielchristopherfox.com/og-default.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Daniel Fox, Retail Music Behaviorist">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://danielchristopherfox.com/og-default.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500;0,6..72,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{nav_prefix}}styles.css">

  <!-- Structured data -->
  {{schema}}
</head>
<body>
  {{header}}

  <main>
    {{content}}
  </main>

  {{footer}}

  <script>
    // Fade-up on scroll
    (function () {
      var els = document.querySelectorAll('.fade-up');
      if (!('IntersectionObserver' in window) || !els.length) {
        els.forEach(function (e) { e.classList.add('in'); });
        return;
      }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('in');
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12 });
      els.forEach(function (e) { io.observe(e); });
    })();

    // Mobile nav toggle
    (function () {
      var btn = document.querySelector('.nav-toggle');
      var links = document.querySelector('.nav-links');
      if (!btn || !links) return;
      btn.addEventListener('click', function () {
        var open = links.classList.toggle('open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    })();
  </script>
</body>
</html>

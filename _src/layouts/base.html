<!DOCTYPE html>
<html lang="en">
<head>
  {{head_meta}}

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{nav_prefix}}styles.css">

  <!-- Structured data -->
  {{schema}}
</head>
<body>
  {{header}}

  <main>
    {{content}}
  </main>

  {{footer}}

  <script>
    // Fade-up on scroll
    (function () {
      var els = document.querySelectorAll('.fade-up');
      if (!('IntersectionObserver' in window) || !els.length) {
        els.forEach(function (e) { e.classList.add('in'); });
        return;
      }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('in');
            io.unobserve(entry.target);
          }
        });
      // Low threshold on purpose: a fractional threshold never fires for
      // elements much taller than the viewport (e.g. the note card grids on
      // mobile), which left them stuck invisible.
      }, { threshold: 0.01 });
      els.forEach(function (e) { io.observe(e); });
    })();
    // (Mobile nav toggle + active-page state live in the shared header partial.)
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <meta name="description" content="{{meta_description}}">
  <meta name="robots" content="{{robots}}">
  <link rel="canonical" href="{{canonical}}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{meta_description}}">
  <meta property="og:url" content="{{canonical}}">
  <meta property="og:site_name" content="Daniel Fox">
  <meta property="og:image" content="https://danielchristopherfox.com/og-default.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Daniel Fox, Retail Music Behaviorist">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://danielchristopherfox.com/og-default.png">

  <link rel="stylesheet" href="{{nav_prefix}}light.css">

  <!-- Structured data -->
  {{schema}}
</head>
<body>
  <div class="page">
    {{content}}
  </div>

  <script src="{{nav_prefix}}cymatics.js"></script>
  <script src="{{nav_prefix}}light.js"></script>
</body>
</html>

<header class="site-header">
  <div class="container header-inner">
    <a class="wordmark" href="/">Daniel Fox</a>
    <button class="nav-toggle" aria-label="Menu" aria-expanded="false">≡</button>
    <nav class="nav-links">
      <a href="{{nav_prefix}}index.html">Home</a>
      <a href="{{nav_prefix}}the-work.html">The Work</a>
      <a href="{{nav_prefix}}about.html">About</a>
      <a href="{{nav_prefix}}writing.html">Writing</a>
      <a href="{{nav_prefix}}speaking.html">Speaking</a>
      <a href="{{nav_prefix}}contact.html">Contact</a>
      <a class="btn btn-primary btn-nav" href="{{nav_prefix}}contact.html">Start a conversation</a>
    </nav>
  </div>
</header>
<script>
  // Shared header behavior: mobile toggle + active-page state (single source of truth).
  (function () {
    var btn = document.querySelector('.nav-toggle');
    var links = document.querySelector('.nav-links');
    if (btn && links) {
      btn.addEventListener('click', function () {
        var open = links.classList.toggle('open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }
    var current = location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.nav-links a').forEach(function (a) {
      if (a.classList.contains('btn')) return;
      var target = (a.getAttribute('href') || '').split('/').pop();
      if (target === current) { a.classList.add('active'); a.setAttribute('aria-current', 'page'); }
    });
  })();
</script>

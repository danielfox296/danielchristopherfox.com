name: Deploy daniel-site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build site
        run: python3 build.py
      - name: Stage site files
        run: |
          mkdir -p _site
          # Copy the whole built site, excluding source and tooling.
          # rsync (not a hand-picked cp list) so new output dirs like
          # notes/ and essays/ and assets like sitemap.xml are never missed.
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_src' \
            --exclude='_site' \
            --exclude='build.py' \
            --exclude='README.md' \
            --exclude='__pycache__' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            ./ _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
